<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cold Email Writer — AI Powered</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6aff;
    --accent2: #a78bfa;
    --text: #f0eeff;
    --muted: #6b6a80;
    --muted2: #9998b0;
    --success: #4ade80;
    --error: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(124,106,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(167,139,250,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 20px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 100px;
    background: rgba(124,106,255,0.1);
    border: 1px solid rgba(124,106,255,0.2);
    font-size: 12px;
    font-weight: 500;
    color: var(--accent2);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .badge::before {
    content: '✦';
    font-size: 10px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 7vw, 52px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
  }

  h1 span {
    background: linear-gradient(135deg, #7c6aff, #c4b5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted2);
    font-size: 16px;
    line-height: 1.6;
    font-weight: 300;
    max-width: 420px;
    margin: 0 auto;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .label-icon {
    width: 16px;
    height: 16px;
    opacity: 0.6;
  }

  textarea {
    width: 100%;
    min-height: 110px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea::placeholder { color: var(--muted); }

  textarea:focus {
    border-color: rgba(124,106,255,0.4);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.08);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
  }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, #7c6aff, #9d8bff);
    color: white;
    box-shadow: 0 4px 20px rgba(124,106,255,0.3);
  }

  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 25px rgba(124,106,255,0.4);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-ghost {
    background: rgba(255,255,255,0.04);
    color: var(--muted2);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover {
    background: rgba(255,255,255,0.07);
    color: var(--text);
  }

  /* Error */
  .error-box {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--error);
    font-size: 14px;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease both;
  }

  /* Results label */
  .results-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  .results-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  /* Email card */
  .email-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 28px;
    margin-bottom: 14px;
    animation: fadeUp 0.5s ease both;
    transition: border-color 0.2s;
  }

  .email-card:hover {
    border-color: rgba(124,106,255,0.2);
  }

  .email-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }

  .email-num {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: rgba(124,106,255,0.1);
    color: var(--accent2);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .email-subject {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted2);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
  }

  .copy-btn:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
  }

  .copy-btn.copied {
    color: var(--success);
    border-color: rgba(74,222,128,0.2);
    background: rgba(74,222,128,0.06);
  }

  .email-body {
    color: #b8b7cc;
    font-size: 14px;
    line-height: 1.8;
    font-weight: 300;
    white-space: pre-line;
    padding-left: 40px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 20px;
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .empty-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 24px;
  }

  .empty p {
    color: var(--muted);
    font-size: 14px;
  }

  /* Spinner */
  .spin {
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  /* Regen row */
  .regen-row {
    text-align: center;
    padding-top: 8px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 48px;
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="badge">AI Powered Tool</div>
    <h1>Cold Email<br><span>Writer</span></h1>
    <p class="subtitle">Describe your outreach goal. Get two human-sounding cold emails, ready to send.</p>
  </div>

  <div class="card">
    <div class="label">
      <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      What's the email about?
    </div>
    <textarea id="topic" placeholder="e.g. Reaching out to small bakery owners about my social media management service that gets them 3x more orders"></textarea>
    <div class="card-footer">
      <span class="hint">Ctrl + Enter to generate</span>
      <button class="btn btn-primary" id="generateBtn" onclick="generateEmails()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Generate Emails
      </button>
    </div>
  </div>

  <div id="errorBox" class="error-box" style="display:none;"></div>

  <div id="results"></div>

</div>

<script>
  // ============================================
  // PASTE YOUR GROQ API KEY BELOW (BETWEEN THE QUOTES)
  const GROQ_API_KEY = "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";
  // ============================================

  const topicEl = document.getElementById('topic');
  const generateBtn = document.getElementById('generateBtn');
  const errorBox = document.getElementById('errorBox');
  const resultsEl = document.getElementById('results');

  topicEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generateEmails();
  });

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  function hideError() {
    errorBox.style.display = 'none';
  }

  function setLoading(val) {
    generateBtn.disabled = val;
    generateBtn.innerHTML = val
      ? `<span class="spin">↻</span> Generating...`
      : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Generate Emails`;
  }

  async function generateEmails() {
    const topic = topicEl.value.trim();
    if (!topic) return;

    hideError();
    setLoading(true);
    resultsEl.innerHTML = '';

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${GROQ_API_KEY}`
        },
        body: JSON.stringify({
          model: 'llama3-70b-8192',
          messages: [
            {
              role: 'system',
              content: `You write cold emails that sound like a real human wrote them — not AI.

Generate exactly 2 cold emails for the given topic.
Each email must:
- Have a unique subject line (not salesy or clickbaity)
- Be 3-4 short sentences max
- Sound natural, direct, and conversational
- Have ONE clear call to action at the end
- Never use phrases like "I hope this finds you well", "I wanted to reach out", "synergy", "leverage"

Return ONLY raw JSON in this exact format, nothing else:
{"emails":[{"subject":"subject here","body":"email body here"},{"subject":"subject here","body":"email body here"}]}`
            },
            {
              role: 'user',
              content: `Write cold emails for: ${topic}`
            }
          ],
          temperature: 0.8,
          max_tokens: 800
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error?.message || 'API error. Check your API key.');
      }

      const content = data.choices?.[0]?.message?.content;
      if (!content) throw new Error('No response from AI');

      let parsed;
      try {
        const clean = content.replace(/```json|```/g, '').trim();
        parsed = JSON.parse(clean);
      } catch {
        throw new Error('Could not read AI response. Try again.');
      }

      const emails = parsed.emails;
      if (!emails || emails.length === 0) throw new Error('No emails generated. Try again.');

      renderEmails(emails);

    } catch (err) {
      showError(err.message || 'Something went wrong. Try again.');
    } finally {
      setLoading(false);
    }
  }

  function renderEmails(emails) {
    let html = `
      <div class="results-label">
        <div class="results-dot"></div>
        ${emails.length} emails generated
      </div>
    `;

    emails.forEach((email, i) => {
      html += `
        <div class="email-card" style="animation-delay:${i * 120}ms">
          <div class="email-header">
            <div class="email-num">${i + 1}</div>
            <div class="email-subject">${escapeHtml(email.subject)}</div>
            <button class="copy-btn" id="copy-${i}" onclick="copyEmail(${i}, \`${escapeTick(email.subject)}\`, \`${escapeTick(email.body)}\`)">
              ⎘ Copy
            </button>
          </div>
          <div class="divider"></div>
          <div class="email-body">${escapeHtml(email.body)}</div>
        </div>
      `;
    });

    html += `
      <div class="regen-row">
        <button class="btn btn-ghost" onclick="generateEmails()">
          ↻ &nbsp;Regenerate
        </button>
      </div>
    `;

    resultsEl.innerHTML = html;
  }

  function copyEmail(index, subject, body) {
    const text = `Subject: ${subject}\n\n${body}`;
    navigator.clipboard.writeText(text).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    });
    const btn = document.getElementById(`copy-${index}`);
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '⎘ Copy';
      btn.classList.remove('copied');
    }, 2000);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escapeTick(str) {
    return str.replace(/`/g, "'").replace(/\\/g, '\\\\').replace(/\n/g, '\\n');
  }

  // Show empty state initially
  resultsEl.innerHTML = `
    <div class="empty">
      <div class="empty-icon">✉</div>
      <p>Your generated emails will appear here</p>
    </div>
  `;
</script>
</body>
</html>
